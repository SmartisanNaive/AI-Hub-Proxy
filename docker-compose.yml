services:
  ai-hub-proxy:
    build: .
    container_name: ai-hub-proxy
    restart: unless-stopped
    ports:
      - "9000:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
